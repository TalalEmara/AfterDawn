<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Stereoscopic VR Looper</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
    }

    /* Both eyes need the same centering logic now */
    .left-eye, .right-eye {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .left-eye {
      background-color: #000;
      border-right: 1px solid #222;
    }

    /* The wrapper that tightly hugs the raw image */
    .scene-container {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      display: inline-block;
    }

    /* The raw scene dictates the size of the container (Changed to a class so it applies to both eyes) */
    .img-raw {
      display: block;
      max-width: 100%;
      max-height: 100vh;
      width: auto;
      height: auto;
      opacity: 0;
      transition: opacity 0.15s ease-in-out;
    }

    /* Overlay images (Detection and Center-Crops) */
    .overlay-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* Keeps them perfectly centered */
      opacity: 0;
      transition: opacity 0.15s ease-in-out;
    }

    /* Active class toggles visibility */
    .active {
      opacity: 1 !important;
    }

    /* Controls UI */
    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 15px;
    }

    button {
      background: #444;
      color: white;
      border: 1px solid #666;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #666;
    }
  </style>
</head>
<body>

  <div class="controls">
    <button id="fullscreen-btn">Fullscreen</button>
  </div>

  <div class="left-eye">
    <div class="scene-container">
      <img id="img-raw-left" src="image.png" class="left-img img-raw active" alt="Raw Scene Left">
      <img id="overlay-detect-left" src="overlay_0152.png" class="left-img overlay-img" alt="Detection Left">
    </div>
  </div>

  <div class="right-eye">
    <div class="scene-container">
      <img id="img-raw-right" src="image.png" class="right-img img-raw active" alt="Raw Scene Right">
      
      <img id="overlay-detect" src="overlay_0152.png" class="right-img overlay-img" alt="Detection">
      <img id="overlay-crop" src="PhotoshopExtension_Image.png" class="right-img overlay-img" alt="Cropped Canvas">
      <img id="overlay-pixel" src="Screenshot 2026-06-28 000402.png" class="right-img overlay-img" alt="Pixelated View">
      <img id="overlay-heatmap" src="WhatsApp Image 2026-06-28 at 3.29.28 AM.jpeg" class="right-img overlay-img" alt="Heatmap View">
    </div>
  </div>

  <script>
    // Group images by eye
    const leftImages = document.querySelectorAll('.left-img');
    const rightImages = document.querySelectorAll('.right-img');
    
    // Right Eye Elements
    const rawRight = document.getElementById('img-raw-right');
    const overlayDetect = document.getElementById('overlay-detect');
    const overlayCrop = document.getElementById('overlay-crop');
    const overlayPixel = document.getElementById('overlay-pixel');
    const overlayHeatmap = document.getElementById('overlay-heatmap'); 

    // Left Eye Elements
    const rawLeft = document.getElementById('img-raw-left');
    const detectLeft = document.getElementById('overlay-detect-left');
    
    let currentIndex = 0;
    const loopSpeedMs = 1200; // Change image every 1.2s

    // 1. Precise Auto-Scaling Logic for BOTH eyes
    function syncScales() {
      // --- SCALE RIGHT EYE ---
      const scaleRight = rawRight.clientWidth / rawRight.naturalWidth;
      
      if(overlayDetect.naturalWidth > 0) {
        overlayDetect.style.width = (overlayDetect.naturalWidth * scaleRight) + 'px';
        overlayDetect.style.height = (overlayDetect.naturalHeight * scaleRight) + 'px';
      }

      if(overlayCrop.naturalWidth > 0) {
        const cropWidth = (overlayCrop.naturalWidth * scaleRight) + 'px';
        const cropHeight = (overlayCrop.naturalHeight * scaleRight) + 'px';
        
        overlayCrop.style.width = cropWidth;
        overlayCrop.style.height = cropHeight;
        overlayPixel.style.width = cropWidth;
        overlayPixel.style.height = cropHeight;
        overlayHeatmap.style.width = cropWidth;
        overlayHeatmap.style.height = cropHeight;
      }

      // --- SCALE LEFT EYE ---
      const scaleLeft = rawLeft.clientWidth / rawLeft.naturalWidth;
      
      if(detectLeft.naturalWidth > 0) {
        detectLeft.style.width = (detectLeft.naturalWidth * scaleLeft) + 'px';
        detectLeft.style.height = (detectLeft.naturalHeight * scaleLeft) + 'px';
      }
    }

    // Run scaling on load and resize
    window.addEventListener('load', syncScales);
    window.addEventListener('resize', syncScales);
    
    // Extra safeguards for cached image loads
    rawRight.onload = syncScales;
    overlayDetect.onload = syncScales;
    overlayCrop.onload = syncScales;
    overlayPixel.onload = syncScales;
    overlayHeatmap.onload = syncScales;
    rawLeft.onload = syncScales;
    detectLeft.onload = syncScales;

    // 2. Stereoscopic Looping Logic
    function nextFrame() {
      // Remove active class from all images in both eyes
      leftImages.forEach(img => img.classList.remove('active'));
      rightImages.forEach(img => img.classList.remove('active'));
      
      // Move to next index (Dictated by the right eye's 5 images)
      currentIndex = (currentIndex + 1) % rightImages.length;
      
      // Right eye ALWAYS gets the active class for the current index
      rightImages[currentIndex].classList.add('active');

      // Left eye ONLY gets the active class if we are on the first two images (Index 0 or 1)
      // Otherwise, nothing gets an active class and the left eye naturally shows black
      if (currentIndex === 0 || currentIndex === 1) {
        leftImages[currentIndex].classList.add('active');
      }
    }

    setInterval(nextFrame, loopSpeedMs);

    // 3. Fullscreen Logic
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        fullscreenBtn.textContent = 'Exit Fullscreen';
      } else {
        document.exitFullscreen();
        fullscreenBtn.textContent = 'Fullscreen';
      }
    });
  </script>
</body>
</html>
